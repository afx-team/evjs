name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.0.1-rc.8)"
        required: true
        type: string
      tag:
        description: "npm dist-tag"
        required: true
        type: choice
        default: latest
        options:
          - latest
          - alpha
          - next

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm install

      - name: Sync & bump versions
        run: |
          node scripts/sync-versions.js ${{ inputs.version }}
          npm version ${{ inputs.version }} --workspaces --no-git-tag-version --allow-same-version
          npm version ${{ inputs.version }} --no-git-tag-version --include-workspace-root --allow-same-version

      - run: npm run build
      - run: npm test

      - name: Deref templates for publishing
        run: node packages/cli/scripts/deref-templates.js

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and tag
        run: |
          git add -A
          git commit -m "release: v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin main --tags

      - name: Publish packages
        run: |
          npm publish --workspace=packages/manifest --access public --provenance --tag ${{ inputs.tag }}
          npm publish --workspace=packages/build-tools --access public --provenance --tag ${{ inputs.tag }}
          npm publish --workspace=packages/runtime --access public --provenance --tag ${{ inputs.tag }}
          npm publish --workspace=packages/webpack-plugin --access public --provenance --tag ${{ inputs.tag }}
          npm publish --workspace=packages/cli --access public --provenance --tag ${{ inputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Restore templates
        run: node packages/cli/scripts/restore-templates.js

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes
