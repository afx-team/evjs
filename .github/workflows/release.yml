name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: npm install

      - name: Sync version from release tag
        run: |
          node -e "
            const fs = require('fs'), path = require('path');
            const version = '${GITHUB_REF_NAME}'.replace(/^v/, '');
            for (const dir of ['.', 'packages', 'examples']) {
              const entries = dir === '.' ? ['.'] : fs.readdirSync(dir).map(e => path.join(dir, e));
              for (const entry of entries) {
                const p = path.join(entry, 'package.json');
                if (!fs.existsSync(p)) continue;
                const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
                pkg.version = version;
                fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
              }
            }
            console.log('Synced all packages to v' + version);
          "

      - name: Build Packages
        run: npm run build

      - name: Publish to npm
        run: npm publish --workspaces --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
